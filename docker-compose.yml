  #     POSTGRES_DB: botdb
  #     POSTGRES_USER: botuser
  #     POSTGRES_PASSWORD: botpassword
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - bot_network

networks:
  bot_network:
    driver: bridge

