version: '3.8'

services:
  bot:
    build: .
    container_name: viral_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./bot.log:/app/bot.log
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/bot.db
    networks:
      - bot_network

  # Опционально: PostgreSQL для масштабирования
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: bot_postgres
